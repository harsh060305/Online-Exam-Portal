spring.application.name=online-exam
server.port=8080

# ===========================
# MySQL Database Configuration
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/exam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=harsh635
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional (Hibernate detects the dialect automatically)
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===========================
# File Upload
# ===========================
file.upload-dir=./uploads/

# ===========================
# Optional Logging
# ===========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE